services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marjon_suv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marjon_suv"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.main

  api:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.api.app:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
